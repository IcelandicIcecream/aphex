name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      # 'true' only when this run actually published to npm. A run that merely opens
      # the "version packages" PR also succeeds, so downstream jobs must check this
      # rather than the run's conclusion.
      published: ${{ steps.changesets.outputs.published }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Mirror the templates to their standalone repos — but only once the versions they
  # pin are actually on npm.
  sync-templates:
    name: Sync templates
    needs: release
    if: needs.release.outputs.published == 'true'
    uses: ./.github/workflows/sync-template.yml
    secrets: inherit
